name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # Scope by event so a PR's quality-only run cannot cancel an in-flight
  # main-branch deploy. The `pages` group must remain singleton for the
  # actual Pages publish, but PRs don't reach that step.
  group: pages-${{ github.event_name == 'pull_request' && github.ref || 'main' }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run JS tests
        run: npm test

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.12'

      - name: Install pytest
        run: pip install pytest

      - name: Run Python tests
        run: cd scripts && python -m pytest -q

  build:
    needs: quality
    # Build + deploy only run on push to main (and manual dispatch); PRs
    # gate at the quality job and stop there.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22'
          cache: npm

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm ci

      # Restore the photo / cover cache from the previous successful run so we
      # don't re-download every Wikimedia thumb on every build. See #94.
      - name: Restore photo cache
        id: photo-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: public/cached
          key: photo-cache-v1-${{ github.run_id }}
          restore-keys: |
            photo-cache-v1-

      # Chunked approach so a build never burns more than ~5 minutes on cache
      # population — see #109. After ~20 deploys the cache converges and the
      # --limit becomes mostly a no-op (idempotent skip on already-cached).
      - name: Download missing photos (chunked)
        run: python3 scripts/cache-photos.py --limit 200
        timeout-minutes: 5
        # cache-photos.py is fault-tolerant — failures leave upstream URLs in
        # place, and the runtime broken-image fallback handles any that 404.
        continue-on-error: true

      - name: Build Astro site
        run: npm run build

      # Save the (possibly enlarged) cache for the next run. Splitting restore
      # and save lets us "always save" — the default cache action only saves on
      # cache miss for the exact key.
      - name: Save photo cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: public/cached
          key: photo-cache-v1-${{ github.run_id }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: dist/

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
