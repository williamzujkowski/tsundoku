name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # Scope by event so a PR's quality-only run cannot cancel an in-flight
  # main-branch deploy. The `pages` group must remain singleton for the
  # actual Pages publish, but PRs don't reach that step.
  group: pages-${{ github.event_name == 'pull_request' && github.ref || 'main' }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run JS tests
        run: npm test

      - name: Remarque design-token audit
        run: npx remarque-audit --palette src/styles/tokens-site.css --src src/styles

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.12'

      - name: Install pytest
        run: pip install pytest

      - name: Run Python tests
        run: cd scripts && python -m pytest -q

  build:
    needs: quality
    # Runs on PRs too, so a build/bundler break (e.g. a dependency bump that
    # changes the bundler) is caught before merge — `astro check` does not
    # exercise the bundler. On PRs the slow photo-download + cache-save +
    # artifact-upload steps are skipped (see per-step conditions); only the
    # actual `astro build` runs. The deploy job stays push-only. See #189.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22'
          cache: npm

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm ci

      # Restore the photo / cover cache from the previous successful run so we
      # don't re-download every Wikimedia thumb on every build. See #94.
      - name: Restore photo cache
        id: photo-cache-restore
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: public/cached
          key: photo-cache-v1-${{ github.run_id }}
          restore-keys: |
            photo-cache-v1-

      # Chunked approach so a build never burns more than ~10 minutes on cache
      # population — see #109. The limit counts *new downloads* (not records
      # iterated), so a build with mostly already-cached records still pushes
      # towards convergence rather than getting stuck on the alphabetically-
      # early entries.
      - name: Download missing photos (chunked)
        # Skip on PRs — we only need to validate that the site *compiles*,
        # not populate covers. Keeps the PR build fast (~1-2 min).
        if: github.event_name != 'pull_request'
        run: python3 scripts/cache-photos.py --limit 1000
        timeout-minutes: 10
        # cache-photos.py is fault-tolerant — failures leave upstream URLs in
        # place, and the runtime broken-image fallback handles any that 404.
        continue-on-error: true

      - name: Build Astro site
        run: npm run build

      # Save the (possibly enlarged) cache for the next run. Splitting restore
      # and save lets us "always save" — the default cache action only saves on
      # cache miss for the exact key.
      - name: Save photo cache
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        if: always() && github.event_name != 'pull_request'
        with:
          path: public/cached
          key: photo-cache-v1-${{ github.run_id }}

      - name: Upload artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: dist/

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
